name: zizmor

# Supply-chain GATE for GitHub Actions. zizmor audits every workflow for
# unpinned actions, excessive permissions, dangerous triggers, template
# injection, etc. Uses the official action (which fails the build on findings);
# a hand-rolled `zizmor --format=sarif` step exits 0 and silently passes.

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
