name: hygiene

# Hygiene gate for the clean-room reference verifier.
#
# The P0 report-only baseline (ruff/vulture/pyright) has been cleaned to zero, so
# per redesign/refactor/hygiene-and-ci.md §3 those three now BLOCK: ruff check +
# ruff format --check (STYLE/LINT), vulture (DEAD-CODE), pyright strict (TYPES).
# A finding is a red build, not summary noise. The three concerns stay distinct.
#
# deptry (DEPS) stays DEFERRED: it needs project metadata (`pyproject.toml`) or
# installed package metadata, and the verifier ships as loose scripts pinned via
# `verifier/requirements.txt`. Re-enable once the verifier is packaged.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Real gate (not report-only): fails red if an ignored-class artifact is tracked.
  tracked-junk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false }
      - run: bash scripts/check-tracked-junk.sh

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { persist-credentials: false }
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with: { python-version: '3.12' }
      - name: Python hygiene gate (blocking)
        run: |
          s="$GITHUB_STEP_SUMMARY"
          echo "## Python hygiene gate" >> "$s"
          # Run every blocking check, record each in the job summary, and fail the
          # build at the end if ANY reported a finding (so one red check never
          # hides the others' output).
          # `set -e` is on by default in GitHub `run:`; capture each tool's exit
          # WITHOUT aborting (`if ! out=$(...)`) so every finding lands in the
          # summary, then fail once at the end.
          failed=0
          gate() {
            t="$1"; shift
            rc=0
            out="$("$@" 2>&1)" || rc=$?
            if [ "$rc" -ne 0 ]; then failed=1; fi
            { echo "<details><summary>$t (exit $rc)</summary>"; echo '```'; echo "$out"; echo '```'; echo "</details>"; } >> "$s"
          }
          gate "ruff check (LINT)" uvx ruff check verifier
          gate "ruff format --check (STYLE)" uvx ruff format --check verifier
          gate "vulture (DEAD-CODE)" uvx vulture verifier --min-confidence 80
          gate "pyright (TYPES, strict)" uvx --with-requirements verifier/requirements.txt pyright verifier
          exit "$failed"
      - name: deptry (DEPS) — DEFERRED
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## deptry (DEPS) — DEFERRED

          deptry needs project metadata (`pyproject.toml`) or installed package
          metadata to resolve declared-vs-imported deps, but the verifier ships as
          loose scripts pinned via `verifier/requirements.txt` (no `pyproject.toml`).
          Re-enable once the verifier is packaged. Until then the requirements file
          is the dependency source of truth. See redesign/refactor/hygiene-and-ci.md §3.
          EOF
