id = "llm_completion"
label = "LLM completion / chat / media-gen request"
coarse_verb = "llm_call"
target_type = "host"
target_label = "Model provider host"

  [[action.field]]
  name = "provider"
  type = "enum"
  ops = ["eq", "in"]
  values = ["openai", "anthropic", "google", "aws", "cohere", "local", "other"]

  [[action.field]]
  name = "model"
  type = "string"
  ops = ["eq", "in", "matches"]

  [[action.field]]
  name = "host"
  type = "host"
  ops = ["eq", "in", "matches"]

  [[action.field]]
