  type = "enum"
  ops = ["eq", "in"]
  values = ["text", "image", "audio", "video", "multimodal"]

  [[action.field]]
  name = "has_attachment"
  type = "bool"
  ops = ["eq"]

  [[action.field]]
  name = "token_estimate"
  type = "number"
  ops = ["gt", "lt", "eq"]

  [[action.field]]
