# catalog.toml — the HESO fine-grained action catalog (the source of truth as
# RUNTIME DATA).
#
# 10 lanes (domains) / 39 fine actions, each mapping DOWN to exactly one of the
# 7 FROZEN signed coarse verbs (llm_call, tool_call, http_request, payment,
# data_export, account_change, delete). This file is the catalog half of the
# `heso_engine::catalog` module: it is embedded at build time via
# include_str! and deserialized into the typed `Catalog`. A customer override
# (HESO_CATALOG path, or a catalog.toml in the project root) MERGES on top of
# this shipped default — a customer may ADD domains/actions, but may NOT remap a
# built-in action onto a different coarse_verb (that would break the cross-verb
# priority ladder), and the loader rejects such an override at load time.
#
# Generated from .agents/policy-catalog.json (final.domains). Keep in sync: this
# is pure data and carries NO crypto. type/ops/target_type/coarse_verb are CLOSED
# enums validated fail-closed by `Catalog::parse`.
#
# Field shape: name (str), type (bool|enum|host|money|number|string),
# ops (subset of eq|gt|lt|in|matches), and values (required iff type=enum).

[[action]]
domain = "model"
