# registry.toml — HESO/1 machine-readable extension registry.
#
# Status: Normative. This file allocates namespaces and names active extension
# manifests. The manifests carry executable predicate rows; this registry is the
# append-only discovery and governance index.
#
# Rules:
#   * Bare names are reserved for the core taxonomy.
#   * Extensions MUST be namespaced `<ns>/<name>`.
#   * An `extend` extension MUST target one existing core class and MUST map to
#     that class's primitive; it can only add predicate rows.
#   * Extension manifests and their vectors are immutable once published.
#   * Retire by changing status to "deprecated" and adding `superseded_by`; do
#     not delete old entries.

[[namespace]]
ns = "heso"
owner = "HESO specification maintainers"
contact = "https://github.com/heso-inc/heso-spec"
registered = "2026-06-30"
homepage = "https://github.com/heso-inc/heso-spec"

[[extension]]
id = "heso/payment-providers"
kind = "extend"
target_class = "payment_endpoint"
primitive = "move-value"
summary = "First-party well-known payment processor host facts."
manifest = "taxonomy/extensions/heso/payment-providers.toml"
vectors = "vectors/heso-1.0-crown-vectors.json#taxonomy_classify"
status = "active"
registered = "2026-06-30"

[[extension]]
id = "heso/identity-providers"
kind = "extend"
target_class = "identity_endpoint"
primitive = "change-authority"
summary = "First-party well-known IAM, auth, and SSO host facts."
manifest = "taxonomy/extensions/heso/identity-providers.toml"
vectors = "vectors/heso-1.0-crown-vectors.json#taxonomy_classify"
status = "active"
registered = "2026-06-30"

[[extension]]
id = "heso/secret-stores"
kind = "extend"
